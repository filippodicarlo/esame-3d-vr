<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Render 360 - Progetto Esame</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="mio-render" src="Img-360.webp">
      </a-assets>

      <a-sky src="#mio-render" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
